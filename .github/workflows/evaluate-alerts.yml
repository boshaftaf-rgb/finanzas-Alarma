# Dispara el worker en Vercel sin Vercel Cron (plan de pago).
# Gratis en repos públicos; en privados cuenta contra minutos de Actions.
#
# Secrets en GitHub → Settings → Secrets and variables → Actions:
#   VERCEL_APP_URL  → https://tu-proyecto.vercel.app
#   CRON_SECRET     → mismo valor que en Vercel

name: Evaluar alertas

on:
  schedule:
    # Cada 5 min, lun–vie (UTC). Fuera de horario NY el worker responde mercado_cerrado.
    - cron: "*/5 * * * 1-5"
  workflow_dispatch:

jobs:
  trigger-worker:
    runs-on: ubuntu-latest
    steps:
      - name: Invocar worker en Vercel
        env:
          VERCEL_APP_URL: ${{ secrets.VERCEL_APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$VERCEL_APP_URL" ] || [ -z "$CRON_SECRET" ]; then
            echo "Faltan secrets VERCEL_APP_URL o CRON_SECRET en GitHub"
            exit 1
          fi
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${VERCEL_APP_URL}/api/cron/evaluate"
